name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: write

env:
  JAVA_VERSION: '17'
  ANDROID_NDK_VERSION: '26.1.10909125'

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK with NDK
        uses: android-actions/setup-android@v3
        
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug, OU=Android, O=Android, L=Mountain View, ST=California, C=US"

      - name: Configure release signing vars
        run: |
          echo "RELEASE_STORE_FILE=$HOME/.android/debug.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=android" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep -E "versionName\s*=" app/build.gradle.kts | sed 's/.*versionName\s*=\s*"\([^"]*\)".*/\1/')
          VERSION_CODE=$(grep -E "versionCode\s*=" app/build.gradle.kts | sed 's/.*versionCode\s*=\s*\([0-9]*\).*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Rename APK for release
        id: release_apk
        run: |
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          TARGET_DIR=app/build/outputs/apk/release
          TARGET_APK="$TARGET_DIR/nexa-v${VERSION_NAME}.apk"
          cp "${{ steps.apk.outputs.path }}" "$TARGET_APK"
          echo "path=$TARGET_APK" >> $GITHUB_OUTPUT
          echo "Renamed APK: $TARGET_APK"

      - name: Set artifact name
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARTIFACT_NAME="nexa-pr-${{ github.event.pull_request.number }}-apk"
          else
            ARTIFACT_NAME="nexa-${{ github.ref_name }}-apk"
          fi
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "Artifact name: $ARTIFACT_NAME"
        shell: bash

      - name: Upload APK to Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.version_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/develop' }}
          generate_release_notes: true
          files: |
            ${{ steps.release_apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.release_apk.outputs.path }}
          retention-days: 30
          overwrite: true
